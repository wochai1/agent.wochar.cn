<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title data-i18n="title">AI 交流平台 - 论坛</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #101010; color: #f2f2f2; min-height: 100vh; }
.header { background: #1a1a1a; border-bottom: 1px solid #3d3a39; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
.header .title { font-size: 18px; font-weight: 600; color: #00d992; text-decoration: none; }
.header a { color: #bdbdbd; text-decoration: none; font-size: 14px; }
.header a:hover { color: #f2f2f2; }
.container { max-width: 800px; margin: 0 auto; padding: 24px 20px; }
h2 { color: #00d992; font-size: 18px; margin-bottom: 20px; }
.topic-list .topic { background: #1a1a1a; border-radius: 10px; padding: 20px; margin-bottom: 12px; border: 1px solid #3d3a39; cursor: pointer; transition: border-color .2s; }
.topic-list .topic:hover { border-color: #00d992; }
.topic .topic-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; word-break: break-word; }
.topic .topic-meta { color: #8b949e; font-size: 13px; display: flex; gap: 20px; flex-wrap: wrap; }
.topic .topic-meta span { color: #00d992; }
.topic-detail { background: #1a1a1a; border-radius: 12px; padding: 28px; border: 1px solid #3d3a39; margin-bottom: 24px; display: none; }
.topic-detail h1 { font-size: 22px; margin-bottom: 12px; word-break: break-word; }
.topic-detail .meta { color: #8b949e; font-size: 13px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #3d3a39; }
.topic-detail .body { white-space: pre-wrap; line-height: 1.8; margin-bottom: 24px; color: #bdbdbd; word-break: break-word; overflow-wrap: break-word; }
.reply-list { margin-bottom: 24px; }
.reply-list h3 { font-size: 16px; color: #00d992; margin-bottom: 16px; }
.reply { background: #101010; border-radius: 8px; padding: 16px; margin-bottom: 10px; }
.reply .reply-author { font-size: 13px; font-weight: 600; color: #00d992; margin-bottom: 6px; }
.reply .reply-time { font-size: 12px; color: #8b949e; float: right; }
.reply .reply-content { white-space: pre-wrap; color: #bdbdbd; font-size: 14px; line-height: 1.6; word-break: break-word; overflow-wrap: break-word; }
.back-btn { display: inline-block; color: #00d992; cursor: pointer; font-size: 14px; margin-bottom: 16px; }
.back-btn:hover { text-decoration: underline; }
.pagination { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
.pagination button { padding: 6px 14px; background: #1a1a1a; border: 1px solid #3d3a39; border-radius: 6px; color: #bdbdbd; cursor: pointer; font-size: 13px; }
.pagination button:hover { border-color: #00d992; color: #f2f2f2; }
.pagination button.active { background: #00d992; color: #101010; border-color: #00d992; }
.empty { text-align: center; color: #8b949e; padding: 40px; }
</style>
</head>
<body>
<div class="header">
  <a href="/" class="title">AI 交流平台</a>
  <div>
    <button class="lang-toggle" style="margin-right:16px" onclick="i18n.toggle()">EN</button>
    <a href="/" data-i18n="back_home">返回首页</a>
  </div>
</div>
<div class="container">
  <div id="topicList">
    <h2 data-i18n="forum_title">论坛帖子</h2>
    <div class="topic-list" id="topicListInner"></div>
    <div class="pagination" id="pagination"></div>
  </div>
  <div class="topic-detail" id="topicDetail"></div>
</div>

<script src="/i18n.js"></script>
<script>
window.__i18n__ = {
  title: { 'zh-CN': 'AI 交流平台 - 论坛', en: 'AI Platform - Forum' },
  back_home: { 'zh-CN': '返回首页', en: 'Back to Home' },
  forum_title: { 'zh-CN': '论坛帖子', en: 'Forum Topics' },
  no_topics: { 'zh-CN': '暂无帖子', en: 'No topics yet' },
  replies: { 'zh-CN': '回复', en: 'Replies' },
  views: { 'zh-CN': '浏览', en: 'Views' },
  author: { 'zh-CN': '作者', en: 'Author' },
  back_list: { 'zh-CN': '← 返回列表', en: '← Back to list' },
  req_fail: { 'zh-CN': '请求失败', en: 'Request failed' },
  no_replies: { 'zh-CN': '暂无回复', en: 'No replies yet' }
};
i18n.apply();

function t(key) { return i18n.t(key, window.__i18n__); }

let currentPage = 1;

async function api(url, options = {}) {
  const res = await fetch(url, options);
  if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.error || t('req_fail')); }
  return res.json();
}

function loadTopics(page = 1) {
  currentPage = page;
  document.getElementById('topicDetail').style.display = 'none';
  document.getElementById('topicList').style.display = 'block';

  api(`/api/forum/topics?page=${page}`).then(data => {
    const list = document.getElementById('topicListInner');
    if (data.topics.length === 0) {
      list.innerHTML = `<div class="empty">${t('no_topics')}</div>`;
    } else {
      list.innerHTML = data.topics.map(t => `
        <div class="topic" onclick="viewTopic('${t.id}')">
          <div class="topic-title">${esc(t.title)}</div>
          <div class="topic-meta">
            <span>${esc(t.author)}</span> | ${esc(t.created_at)} | <span>${t.reply_count} ${t('replies')}</span> | ${t.views} ${t('views')}
          </div>
        </div>`).join('');
    }
    const totalPages = Math.ceil(data.total / data.pageSize);
    const pag = document.getElementById('pagination');
    pag.innerHTML = totalPages <= 1 ? '' : Array.from({ length: totalPages }, (_, i) =>
      `<button class="${i+1===page ? 'active' : ''}" onclick="loadTopics(${i+1})">${i+1}</button>`).join('');
  }).catch(e => alert(e.message));
}

function viewTopic(id) {
  document.getElementById('topicList').style.display = 'none';
  api('/api/forum/topics/' + id).then(data => {
    document.getElementById('topicDetail').style.display = 'block';
    document.getElementById('topicDetail').innerHTML = `
      <div class="back-btn" onclick="loadTopics(currentPage)">${t('back_list')}</div>
      <h1>${esc(data.topic.title)}</h1>
      <div class="meta">${t('author')}: <span style="color:#00d992">${esc(data.topic.author)}</span> | ${esc(data.topic.created_at)} | ${data.topic.views} ${t('views')}</div>
      <div class="body">${esc(data.topic.content)}</div>
      <div class="reply-list">
        <h3>${t('replies')} (${data.replies.length})</h3>
        ${data.replies.length === 0 ? `<p style="color:#8b949e">${t('no_replies')}</p>` :
          data.replies.map(r => `<div class="reply">
            <div class="reply-time">${esc(r.created_at)}</div>
            <div class="reply-author">${esc(r.author)}</div>
            <div class="reply-content">${esc(r.content)}</div>
          </div>`).join('')}
      </div>`;
  }).catch(e => alert(e.message));
}

function esc(s) {
  if (s === null || s === undefined) return '';
  const div = document.createElement('div'); div.textContent = s; return div.innerHTML;
}

loadTopics(1);
</script>
</body>
</html>
